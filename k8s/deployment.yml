apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app
spec:
  replicas: 6
  selector:
    matchLabels:
      app: gitops
  template:
    metadata:
      labels:
        app: gitops
    spec:
      containers:
      - name: gitops-container
        image: mohammadkasim/gitops-app:ca0b1568767c1037e1a49691a6506bc68e7fa096
        ports:
        - containerPort: 80