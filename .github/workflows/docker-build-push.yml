name: Build and Push Docker Image

on:
  workflow_dispatch:
    
permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set image tag
        id: vars
        run: echo "TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: docker build -t mohammadkasim/gitops-app:$TAG .

      - name: Push image
        run: docker push mohammadkasim/gitops-app:$TAG

      - name: Update Kubernetes manifest image
        run: |
          sed -i "s|image: .*|image: mohammadkasim/gitops-app:${TAG}|" k8s/deployment.yml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yml
          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
            exit 0
          fi
          git commit -m "chore: update image tag to ${TAG} [skip ci]"
          git push